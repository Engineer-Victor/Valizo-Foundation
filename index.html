<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valizo Foundation | Coming Soon</title>
  <meta name="description" content="Valizo Foundation is launching soon. A clean coming soon page for the foundation." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #0b3675;
      --green: #39a936;
      --gold: #f3b307;
      --ink: #102033;
      --muted: #5d6b7c;
      --line: #e8eef4;
      --soft: #f7fafc;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(57, 169, 54, 0.14), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(11, 54, 117, 0.12), transparent 34rem),
        var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 86px;
      height: auto;
      display: block;
    }

    .brand strong {
      font-size: 18px;
      color: var(--blue);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 22px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    nav a {
      color: inherit;
      text-decoration: none;
    }

    .contactButton {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 18px;
      color: var(--blue);
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 12px 40px rgba(16, 32, 51, 0.06);
    }

    main {
      flex: 1;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 54px;
      align-items: center;
      padding: 52px 0 70px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(57, 169, 54, 0.1);
      color: var(--green);
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 26px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 7px rgba(57, 169, 54, 0.13);
    }

    h1 {
      font-size: clamp(48px, 7.2vw, 96px);
      line-height: 0.94;
      letter-spacing: -0.065em;
      color: var(--blue);
      margin-bottom: 28px;
    }

    h1 span {
      color: var(--green);
      display: block;
    }

    .intro {
      max-width: 620px;
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.65;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 44px;
    }

    .primaryButton,
    .secondaryButton {
      border-radius: 999px;
      padding: 16px 22px;
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .primaryButton {
      color: white;
      background: var(--blue);
      box-shadow: 0 18px 40px rgba(11, 54, 117, 0.24);
    }

    .secondaryButton {
      color: var(--blue);
      background: white;
      border: 1px solid var(--line);
    }

    .impactStrip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      max-width: 720px;
    }

    .impactItem {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 55px rgba(16, 32, 51, 0.07);
    }

    .impactItem strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      color: var(--green);
      margin-bottom: 8px;
    }

    .impactItem p {
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
      font-weight: 600;
    }

    .visualWrap {
      position: relative;
      min-height: 570px;
      display: grid;
      place-items: center;
    }

    .shape {
      position: absolute;
      border-radius: 999px;
      filter: blur(0.1px);
      opacity: 0.95;
    }

    .shape.one {
      width: 190px;
      height: 190px;
      background: rgba(57, 169, 54, 0.15);
      top: 22px;
      right: 30px;
    }

    .shape.two {
      width: 150px;
      height: 150px;
      background: rgba(243, 179, 7, 0.18);
      bottom: 42px;
      left: 10px;
    }

    .shape.three {
      width: 78px;
      height: 78px;
      background: rgba(11, 54, 117, 0.13);
      top: 138px;
      left: 32px;
    }

    .logoCard {
      position: relative;
      z-index: 1;
      width: min(430px, 92%);
      aspect-ratio: 1;
      border-radius: 48px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(232, 238, 244, 0.95);
      display: grid;
      place-items: center;
      padding: 48px;
      box-shadow: 0 34px 90px rgba(11, 54, 117, 0.13);
    }

    .logoCard::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 36px;
      border: 1px solid rgba(57, 169, 54, 0.22);
      pointer-events: none;
    }

    .logoCard img {
      width: 100%;
      max-width: 330px;
      height: auto;
      display: block;
    }

    .statusCard {
      position: absolute;
      z-index: 2;
      right: 12px;
      bottom: 74px;
      width: min(310px, 80%);
      padding: 22px;
      border-radius: 26px;
      background: var(--blue);
      color: white;
      box-shadow: 0 30px 70px rgba(11, 54, 117, 0.24);
    }

    .statusCard span {
      display: block;
      color: rgba(255, 255, 255, 0.74);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 9px;
    }

    .statusCard p {
      font-size: 20px;
      line-height: 1.35;
      font-weight: 800;
    }

    footer {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0 34px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 920px) {
      nav {
        display: none;
      }

      main {
        grid-template-columns: 1fr;
        gap: 28px;
        padding-top: 24px;
      }

      .visualWrap {
        min-height: 470px;
      }

      .impactStrip {
        grid-template-columns: 1fr;
      }

      footer {
        flex-direction: column;
      }
    }

    @media (max-width: 560px) {
      header,
      main,
      footer {
        width: min(100% - 28px, 1180px);
      }

      .brand img {
        width: 70px;
      }

      .logoCard {
        border-radius: 34px;
        padding: 34px;
      }

      .statusCard {
        position: relative;
        right: auto;
        bottom: auto;
        margin-top: -34px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
     
      </a>
      <nav aria-label="justify-content">
        <a href="#mission">Mission</a>
        <a href="#impact">Impact</a>
        <a class="contactButton" href="mailto:info@valizofoundation.org">Contact us</a>
      </nav>
    </header>

    

      <section class="visualWrap" id="mission" aria-label="Valizo Foundation launch visual">
        <div class="shape one"></div>
        <div class="shape two"></div>
        <div class="shape three"></div>
        <div class="logoCard">
          <img src="assets/valizo_logo.png" alt="Valizo Foundation logo" />

          <h3>Coming Soon</h3>
        </div>
       
      </section>
    </main>

    <footer>
      <p>© <span id="year"></span> Valizo Foundation. All rights reserved.</p>
  
    </footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
