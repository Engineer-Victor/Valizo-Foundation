<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valizo Foundation | Coming Soon</title>

  <style>
    :root {
      --blue: #0b3675;
      --green: #39a936;
      --gold: #f3b307;
      --text: #102033;
      --muted: #64748b;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(57, 169, 54, 0.18), transparent 280px),
        radial-gradient(circle at bottom right, rgba(11, 54, 117, 0.14), transparent 300px),
        #f8fbff;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      text-align: center;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(57, 169, 54, 0.18);
      border-radius: 34px;
      padding: 46px 34px 34px;
      box-shadow: 0 24px 70px rgba(11, 54, 117, 0.12);
    }

    .logo {
      width: min(320px, 78%);
      height: auto;
      display: block;
      margin: 0 auto 26px;
    }

    .badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(57, 169, 54, 0.12);
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      color: var(--blue);
      font-size: clamp(34px, 7vw, 56px);
      line-height: 1.05;
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }

    p {
      max-width: 470px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .contact {
      display: inline-flex;
      margin-top: 28px;
      padding: 14px 20px;
      border-radius: 999px;
      background: var(--blue);
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }

    footer {
      margin-top: 32px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .page {
        padding: 18px 14px;
        align-items: center;
      }

      .card {
        border-radius: 26px;
        padding: 34px 20px 26px;
      }

      .logo {
        width: min(250px, 82%);
        margin-bottom: 22px;
      }

      p {
        font-size: 15px;
      }

      .contact {
        width: 100%;
      }

      footer {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <img class="logo" src="assets/valizo_logo.png" alt="Valizo Foundation Logo">

      <div class="badge">Website Launching Soon</div>

      <h1>Coming Soon</h1>

      <p>
        Valizo Foundation is preparing a new digital home dedicated to community impact,
        opportunity, and sustainable transformation.
      </p>

      <footer>
        © <span id="year"></span> Valizo Foundation. All rights reserved.
      </footer>
    </section>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
